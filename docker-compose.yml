services:
  app:
    depends_on:
      - postgres_db

    build:
      context: .
      dockerfile: dockerfile
    ports:
      - '3000:3000'
    environment:
      - POSTGRES_USER=swan
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_HOST=postgres_db

  postgres_db:
    image: postgres:17-alpine
    container_name: local
    restart: always
    environment:
      - POSTGRES_USER=swan
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postgres

    ports:
      - '5432:5432'
